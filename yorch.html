<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yorch · Gastos Apple Pay</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --red: #e8001c;
      --red-dim: #7a000f;
      --text: #f0f0f0;
      --muted: #888;
      --green: #00c853;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.85rem; color: var(--muted); }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.6rem; font-weight: 700; }
    .stat-value.red { color: var(--red); }
    .stat-value.green { color: var(--green); }

    .section-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .chart-bar-wrap { margin-bottom: 28px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-label { font-size: 0.8rem; color: var(--muted); width: 90px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.5s; }
    .bar-amount { font-size: 0.8rem; width: 70px; text-align: right; }

    .list { display: flex; flex-direction: column; gap: 8px; }
    .item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .item-icon {
      font-size: 1.4rem;
      width: 36px; text-align: center;
    }
    .item-info { flex: 1; }
    .item-merchant { font-size: 0.95rem; font-weight: 600; }
    .item-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .item-amount { font-size: 1rem; font-weight: 700; color: var(--red); }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px;
      font-size: 0.9rem;
    }
    .tag {
      display: inline-block;
      background: var(--red-dim);
      color: var(--red);
      border-radius: 6px;
      padding: 1px 7px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-left: 6px;
    }
    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <div class="avatar">🧑</div>
  <div>
    <h1>Yorch · Gastos Apple Pay</h1>
    <p>Tracker personal — actualizado por Azrael 🤖</p>
  </div>
</header>

<div class="stats" id="stats">
  <div class="stat"><div class="stat-label">Total del mes</div><div class="stat-value red" id="total-mes">$0</div></div>
  <div class="stat"><div class="stat-label">Transacciones</div><div class="stat-value" id="total-tx">0</div></div>
  <div class="stat"><div class="stat-label">Promedio</div><div class="stat-value" id="promedio">$0</div></div>
  <div class="stat"><div class="stat-label">Mayor gasto</div><div class="stat-value red" id="mayor">$0</div></div>
</div>

<div class="chart-bar-wrap">
  <div class="section-title">Top categorías</div>
  <div id="categorias"></div>
</div>

<div class="section-title">Últimos movimientos</div>
<div class="list" id="lista"></div>

<footer>
  Azrael 🤖 · <span id="update-time">—</span>
</footer>

<script>
  const EMOJIS = {
    food: '🍔', restaurant: '🍽️', coffee: '☕', cafe: '☕',
    uber: '🚗', taxi: '🚕', transport: '🚌', oxxo: '🏪',
    amazon: '📦', shop: '🛍️', market: '🛒', super: '🛒',
    gym: '💪', sport: '⚽', cinema: '🎬', netflix: '📺',
    default: '💳'
  };

  function getEmoji(merchant) {
    const m = merchant.toLowerCase();
    for (const [k, v] of Object.entries(EMOJIS)) {
      if (m.includes(k)) return v;
    }
    return EMOJIS.default;
  }

  function fmt(n) {
    return '$' + n.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  async function load() {
    let data;
    try {
      const r = await fetch('data/gastos-yorch.json?t=' + Date.now());
      data = await r.json();
    } catch(e) {
      data = { gastos: [] };
    }

    const gastos = data.gastos || [];
    const now = new Date();
    const mesActual = gastos.filter(g => {
      const d = new Date(g.fecha);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });

    // Stats
    const total = mesActual.reduce((s, g) => s + g.monto, 0);
    const promedio = mesActual.length ? total / mesActual.length : 0;
    const mayor = mesActual.length ? Math.max(...mesActual.map(g => g.monto)) : 0;

    document.getElementById('total-mes').textContent = fmt(total);
    document.getElementById('total-tx').textContent = mesActual.length;
    document.getElementById('promedio').textContent = fmt(promedio);
    document.getElementById('mayor').textContent = fmt(mayor);

    // Categorías
    const cats = {};
    mesActual.forEach(g => {
      const cat = g.categoria || 'Otros';
      cats[cat] = (cats[cat] || 0) + g.monto;
    });
    const catSorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
    const maxCat = catSorted[0]?.[1] || 1;
    const catEl = document.getElementById('categorias');
    if (catSorted.length === 0) {
      catEl.innerHTML = '<p class="empty">Sin datos todavía</p>';
    } else {
      catEl.innerHTML = catSorted.map(([cat, monto]) => `
        <div class="bar-row">
          <span class="bar-label">${cat}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${(monto/maxCat*100).toFixed(1)}%"></div></div>
          <span class="bar-amount">${fmt(monto)}</span>
        </div>
      `).join('');
    }

    // Lista
    const listaEl = document.getElementById('lista');
    const recientes = [...gastos].reverse().slice(0, 20);
    if (recientes.length === 0) {
      listaEl.innerHTML = '<div class="empty">📭 Aún no hay gastos registrados.<br>Paga algo con Apple Pay y Azrael lo registra automáticamente.</div>';
    } else {
      listaEl.innerHTML = recientes.map(g => {
        const d = new Date(g.fecha);
        const fecha = d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        return `
          <div class="item">
            <div class="item-icon">${getEmoji(g.comercio)}</div>
            <div class="item-info">
              <div class="item-merchant">${g.comercio}<span class="tag">${g.categoria || 'Otros'}</span></div>
              <div class="item-meta">${fecha}${g.nota ? ' · ' + g.nota : ''}</div>
            </div>
            <div class="item-amount">${fmt(g.monto)}</div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('update-time').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-MX');
  }

  load();
  setInterval(load, 30000); // refresca cada 30s
</script>
</body>
</html>
