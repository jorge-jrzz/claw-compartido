<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Team 🦞</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: #888; margin-bottom: 0.5rem; font-size: 1rem; }
    .version { color: #e5002b; font-size: 0.75rem; margin-bottom: 3rem; letter-spacing: 2px; text-transform: uppercase; }
    .team { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 2rem; width: 220px; text-align: center; transition: all 0.3s; }
    .card:hover { border-color: #e5002b; transform: translateY(-4px); }
    .avatar { font-size: 3rem; margin-bottom: 1rem; }
    .name { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
    .role { color: #888; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .bot { color: #e5002b; font-size: 0.8rem; font-weight: 600; }
    .status { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-right: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .footer { margin-top: 4rem; color: #444; font-size: 0.8rem; }
    .logo { font-size: 1.5rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="logo">🦞</div>
  <h1>Claw Team</h1>
  <p class="subtitle">Equipo de IA · Grupo Financiero Banorte</p>
  <p class="version">✦ v2 · Auto-deployed from GitHub ✦</p>
  <div class="team">
    <div class="card">
      <div class="avatar">👨🏽‍💻</div>
      <div class="name">Yorch</div>
      <div class="role">AI & Innovation Analyst</div>
      <div class="bot"><span class="status"></span>Banorte Claw 🦞</div>
    </div>
    <div class="card">
      <div class="avatar">👩🏽‍💻</div>
      <div class="name">Viri</div>
      <div class="role">Equipo IA</div>
      <div class="bot"><span class="status"></span>unbotmas 🤖</div>
    </div>
    <div class="card">
      <div class="avatar">👨🏽‍💻</div>
      <div class="name">Rick</div>
      <div class="role">Equipo IA</div>
      <div class="bot"><span class="status"></span>Yara 🤖</div>
    </div>
  </div>
  <div class="footer">Powered by OpenClaw · Banorte 2026</div>
</body>
</html>
